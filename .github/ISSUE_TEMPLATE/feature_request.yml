name: Feature request
description: Propose an improvement
title: "feat: "
labels: [enhancement]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem to solve
          description: What pain point are you trying to address?
      validations:
          required: true

    - type: textarea
      id: proposal
      attributes:
          label: Proposed solution
          description: Describe the behavior, API, or UX you want.
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered

    - type: textarea
      id: context
      attributes:
          label: Additional context
