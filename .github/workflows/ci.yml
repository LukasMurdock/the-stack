name: CI

on:
    pull_request:
    push:
        branches:
            - main
    schedule:
        - cron: "0 10 * * *"

jobs:
    fast:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Setup just
              uses: taiki-e/install-action@just

            - name: Verify just
              run: just --version

            - name: Install dependencies
              run: npm ci

            - name: Fast checks
              run: just check-fast

    full:
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Setup just
              uses: taiki-e/install-action@just

            - name: Verify just
              run: just --version

            - name: Install dependencies
              run: npm ci

            - name: Full checks
              run: just check-full
