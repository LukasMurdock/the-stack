version: 2
updates:
    - package-ecosystem: npm
      directory: "/"
      schedule:
          interval: weekly
          day: monday
          time: "09:00"
          timezone: "UTC"
      open-pull-requests-limit: 10
      groups:
          npm-minor-and-patch:
              update-types:
                  - minor
                  - patch
      labels:
          - dependencies

    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: weekly
          day: monday
          time: "09:00"
          timezone: "UTC"
      open-pull-requests-limit: 5
      labels:
          - dependencies
